# 盗梦都市 · 前端静态资源 + API 反代配置
# 对照：plans/design/04-system-architecture.md §4.6

server {
  listen 80;
  server_name _;
  client_max_body_size 2m;

  root /usr/share/nginx/html;
  index index.html;

  # 静态资源强缓存（带 hash 的 Vite 产物）
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # PWA Service Worker 不缓存（必须走最新）
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # API 反向代理到 server 容器
  location /api/ {
    proxy_pass http://api:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # WebSocket 反代（socket.io 默认 /ws）
  location /ws {
    proxy_pass http://api:3001/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s;
  }

  # SPA fallback：未命中文件回落到 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
